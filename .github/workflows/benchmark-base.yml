# Tracks the statistical performance baseline on main for Bencher
# (https://bencher.dev/perf/todo-by). PR runs (benchmark.yml) compare
# against this baseline.
name: Benchmark base

on:
  push:
    branches: [main]

env:
  # Keep in sync with benchmark.yml.
  CORPUS_REPO: angular/angular
  CORPUS_REF: v22.0.6

jobs:
  benchmark:
    permissions:
      checks: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install hyperfine
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: hyperfine

      - uses: bencherdev/bencher@5f9d4cf890255c35e0354af1ed325108a6a0babd # v0.6.8

      - name: Fetch corpus
        run: git clone --depth 1 --branch "$CORPUS_REF" "https://github.com/$CORPUS_REPO" /tmp/corpus

      - name: Build binary
        run: cargo build --release --locked

      - name: Track base benchmarks
        run: |
          bencher run \
            --project todo-by \
            --key '${{ secrets.BENCHER_API_KEY }}' \
            --branch main \
            --testbed ubuntu-latest \
            --adapter shell_hyperfine \
            --file results.json \
            "hyperfine --warmup 3 --min-runs 10 --ignore-failure --command-name 'scan angular/angular' --export-json results.json './target/release/todo-by /tmp/corpus'"
